<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Employee Vault Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: white; border-radius: 15px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .header h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .header p { color: #666; }
        
        /* Upload Section */
        .upload-section { background: white; border-radius: 15px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .upload-section h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; }
        
        .upload-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .upload-left { border-right: 2px solid #eee; padding-right: 20px; }
        .upload-right { padding-left: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #555; font-weight: 600; margin-bottom: 8px; }
        .form-group input[type="file"], .form-group input[type="text"], .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        .form-group textarea { min-height: 150px; resize: vertical; }
        
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .btn-danger { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        
        .upload-status { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .upload-status.success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .upload-status.error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .stat-number { font-size: 3em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 10px; font-size: 1.1em; }
        
        /* Task Lists */
        .task-section { background: white; border-radius: 15px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .task-section h2 { color: #667eea; margin-bottom: 20px; }
        
        .task-list { list-style: none; }
        .task-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .task-item:last-child { border-bottom: none; }
        .task-item:hover { background: #f8f9fa; }
        .task-name { flex: 1; color: #333; }
        .task-actions { display: flex; gap: 10px; }
        .task-actions button { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        
        @media (max-width: 768px) {
            .upload-form { grid-template-columns: 1fr; }
            .upload-left { border-right: none; padding-right: 0; }
            .upload-right { padding-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🤖 AI Employee Vault</h1>
            <p>Autonomous Task Management System</p>
        </div>
        
        <!-- Upload Section -->
        <div class="upload-section">
            <h2>📤 Upload to Inbox</h2>
            <div class="upload-form">
                <div class="upload-left">
                    <h3>Option 1: Upload File</h3>
                    <br>
                    <form id="uploadForm" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="file">Select File:</label>
                            <input type="file" id="file" name="file" accept=".txt,.md,.pdf,.doc,.docx" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message (Optional):</label>
                            <textarea id="message" name="message" placeholder="Describe what needs to be done with this file..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="type">Task Type:</label>
                            <select id="type" name="type">
                                <option value="general">General</option>
                                <option value="email">Email</option>
                                <option value="whatsapp">WhatsApp</option>
                                <option value="linkedin">LinkedIn</option>
                                <option value="odoo">Odoo CRM</option>
                            </select>
                        </div>
                        <button type="submit" class="btn">Upload File</button>
                    </form>
                </div>
                
                <div class="upload-right">
                    <h3>Option 2: Quick Message</h3>
                    <br>
                    <form id="quickMessageForm">
                        <div class="form-group">
                            <label for="quickMessage">Type Your Message:</label>
                            <textarea id="quickMessage" name="quickMessage" placeholder="e.g., Send email to client about project update..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="quickType">Task Type:</label>
                            <select id="quickType" name="quickType">
                                <option value="general">General</option>
                                <option value="email">Email</option>
                                <option value="whatsapp">WhatsApp</option>
                                <option value="linkedin">LinkedIn</option>
                                <option value="odoo">Odoo CRM</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="filename">Filename (optional):</label>
                            <input type="text" id="filename" name="filename" placeholder="task">
                        </div>
                        <button type="submit" class="btn btn-success">Create Task</button>
                    </form>
                </div>
            </div>
            
            <div id="uploadStatus" class="upload-status"></div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="needsActionCount">0</div>
                <div class="stat-label">Needs Action</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingApprovalCount">0</div>
                <div class="stat-label">Pending Approval</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approvedCount">0</div>
                <div class="stat-label">Approved</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="doneCount">0</div>
                <div class="stat-label">Done</div>
            </div>
        </div>
        
        <!-- Pending Approval Tasks -->
        <div class="task-section">
            <h2>⏳ Pending Approval</h2>
            <ul class="task-list" id="pendingApprovalList">
                <li class="task-item">Loading...</li>
            </ul>
        </div>
    </div>
    
    <script>
        // Upload File Form
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const statusDiv = document.getElementById('uploadStatus');
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    statusDiv.className = 'upload-status success';
                    statusDiv.textContent = '✅ ' + result.message;
                    statusDiv.style.display = 'block';
                    e.target.reset();
                    refreshStats();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                statusDiv.className = 'upload-status error';
                statusDiv.textContent = '❌ Error: ' + error.message;
                statusDiv.style.display = 'block';
            }
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        });
        
        // Quick Message Form
        document.getElementById('quickMessageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = document.getElementById('quickMessage').value;
            const taskType = document.getElementById('quickType').value;
            const filename = document.getElementById('filename').value || 'task';
            const statusDiv = document.getElementById('uploadStatus');
            
            try {
                const response = await fetch('/api/upload-text', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        type: taskType,
                        filename: filename
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    statusDiv.className = 'upload-status success';
                    statusDiv.textContent = '✅ ' + result.message;
                    statusDiv.style.display = 'block';
                    e.target.reset();
                    refreshStats();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                statusDiv.className = 'upload-status error';
                statusDiv.textContent = '❌ Error: ' + error.message;
                statusDiv.style.display = 'block';
            }
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        });
        
        // Load stats
        async function refreshStats() {
            try {
                const response = await fetch('/api/overview');
                const data = await response.json();
                
                document.getElementById('needsActionCount').textContent = data.needs_action;
                document.getElementById('pendingApprovalCount').textContent = data.pending_approval;
                document.getElementById('approvedCount').textContent = data.approved;
                document.getElementById('doneCount').textContent = data.done;
                
                loadPendingTasks();
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        // Load pending tasks
        async function loadPendingTasks() {
            try {
                const response = await fetch('/api/tasks/pending-approval');
                const tasks = await response.json();
                
                const list = document.getElementById('pendingApprovalList');
                
                if (tasks.length === 0) {
                    list.innerHTML = '<li class="task-item">No pending tasks</li>';
                    return;
                }
                
                list.innerHTML = tasks.map(task => `
                    <li class="task-item">
                        <span class="task-name">${task.filename}</span>
                        <div class="task-actions">
                            <button class="btn-success" onclick="approveTask('${task.filename}')">✓ Approve</button>
                            <button class="btn-danger" onclick="rejectTask('${task.filename}')">✗ Reject</button>
                        </div>
                    </li>
                `).join('');
            } catch (error) {
                console.error('Error loading tasks:', error);
            }
        }
        
        // Approve task
        async function approveTask(filename) {
            try {
                const response = await fetch('/api/task/approve', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ filename: filename })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ Task approved!');
                    refreshStats();
                } else {
                    alert('❌ Error: ' + result.error);
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }
        
        // Reject task
        async function rejectTask(filename) {
            try {
                const response = await fetch('/api/task/reject', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ filename: filename })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ Task rejected!');
                    refreshStats();
                } else {
                    alert('❌ Error: ' + result.error);
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }
        
        // Initial load
        refreshStats();
        
        // Auto-refresh every 10 seconds
        setInterval(refreshStats, 10000);
    </script>
</body>
</html>
